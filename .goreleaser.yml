version: 2

project_name: weigh

env:
  - GO111MODULE=on

before:
  hooks:
    - go mod download

builds:
  - id: weigh
    dir: cmd/weigh
    binary: weigh
    env:
      - CGO_ENABLED=0
    goarm:
      - 6
      - 7
    goos:
      - linux
      - freebsd
    goarch:
      - amd64
      - arm
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.appName={{.Binary}}
    ignore:
      - goos: freebsd
        goarch: arm

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Os "linux" }}Linux
      {{- else if eq .Os "freebsd" }}FreeBSD
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm" }}arm{{ .Arm }}
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: '{{ .ProjectName }}_checksums.txt'

snapshot:
  version_template: '{{ .Tag }}-next'

# Already using git-chglog
changelog:
  disable: true

release:
  name_template: '{{.ProjectName}} v{{.Version}}'
